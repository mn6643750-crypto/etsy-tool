<html lang="en">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Etsy Description Generator</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="/_vercel/insights/script.js"></script>

  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;

<body>

  <!-- Feedback Button -->
  <a href="mailto:mn0752013@gmail.com?subject=Feedback%20for%20AI%20Etsy%20Listing%20Generator&body=Hi%2C%0A%0AI%20wanted%20to%20share%20some%20feedback%20about%20your%20AI%20Etsy%20Listing%20Generator.%0A%0AFeedback%3A%0A%0ABrowser%3A%0ADevice%3A%0A%0AThanks!" 
     class="feedback-btn" 
     title="Send Feedback"
     onclick="trackEvent('feedback_clicked')">
    💬 Feedback
  </a>

  <div class="container">
    <h1>✨ Etsy Description Generator</h1>
    <p class="subtitle">Generate SEO-friendly product descriptions in seconds</p>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="generator">Generator</button>
      <button class="tab" data-tab="analyzer">Competitor Analyzer</button>
      <button class="tab" data-tab="dashboard">📁 Saved</button>
    </div>

    <!-- Generator Tab -->
    <div id="generator" class="tab-content active">
      <div class="form">
        <label>Product Name</label>
        <input type="text" id="productName" placeholder="e.g. Handmade ceramic mug" />

        <label>Materials / Details</label>
        <input type="text" id="materials" placeholder="e.g. ceramic, hand-painted, 12oz" />

        <label>Keywords</label>
        <input type="text" id="keywords" placeholder="e.g. gift, minimalist, kitchen" />

        <label>Description Style</label>
        <div class="style-buttons">
          <button class="style-btn active" data-style="Professional">Professional</button>
          <button class="style-btn" data-style="Luxury">Luxury</button>
          <button class="style-btn" data-style="Friendly">Friendly</button>
          <button class="style-btn" data-style="Emotional">Emotional</button>
          <button class="style-btn" data-style="SEO Focused">SEO Focused</button>
        </div>

        <button id="generateBtn">✨ Generate</button>
        <p class="feedback-hint">Found a bug or have an idea? <a href="mailto:mn0752013@gmail.com?subject=Feedback%20for%20AI%20Etsy%20Listing%20Generator&body=Hi%2C%0A%0AI%20wanted%20to%20share%20some%20feedback%20about%20your%20AI%20Etsy%20Listing%20Generator.%0A%0AFeedback%3A%0A%0ABrowser%3A%0ADevice%3A%0A%0AThanks!">We'd love your feedback.</a></p>
      </div>

      <div class="output" id="output">
        <div id="outputText">Your content will appear here...</div>
      </div>
    </div>

    <!-- Dashboard Tab -->
    <div id="dashboard" class="tab-content">
      <div class="dashboard-header">
        <h2>Saved Listings</h2>
        <button id="clearAllBtn">🗑️ Clear All</button>
      </div>
      <div id="savedListings">
        <p class="empty-msg">No saved listings yet. Generate content and save it!</p>
      </div>
    </div>

    <!-- Analyzer Tab -->
    <div id="analyzer" class="tab-content">
      <div class="form">
        <label>Paste Competitor Description</label>
        <textarea id="competitorText" placeholder="Paste your competitor's product description here..." rows="6"></textarea>

        <button id="analyzeBtn">🔍 Analyze</button>
      </div>

      <div class="output" id="analyzerOutput">
        <div id="analyzerText">Analysis will appear here...</div>
      </div>
    </div>

  </div>

  <script src="prompts.js"></script>
  <script src="categories.js"></script>
  <script src="formatter.js"></script>
  <script src="validator.js"></script>
  <script src="tags.js"></script>
  <script src="script.js"></script>
</body>
</html>
